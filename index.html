<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>航线规划器</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    :root { --panel:#111827; --panel2:#182235; --text:#e5e7eb; --muted:#9ca3af; --accent:#22c55e; --border:#263244; }
    *{box-sizing:border-box} body{margin:0;font-family:"Microsoft YaHei",Arial,sans-serif;background:#0b1020;color:var(--text);overflow:hidden}
    .app{display:grid;grid-template-columns:320px 1fr 330px;grid-template-rows:56px 1fr;height:100vh;width:100vw}
    .top{grid-column:1/4;display:flex;align-items:center;gap:14px;padding:0 18px;background:#0f172a;border-bottom:1px solid var(--border)}
    .brand{font-weight:700;font-size:18px;letter-spacing:.5px}.tabbar{display:flex;gap:6px;margin-bottom:10px}.tab{flex:1;border:1px solid #334155;background:#0b1220;color:#cbd5e1;border-radius:10px;padding:8px 6px;cursor:pointer;font-size:12px;font-weight:700}.tab.active{background:#1d4ed8;color:#fff;border-color:#3b82f6}.manual-on{box-shadow:0 0 0 2px #22c55e inset}.pill{font-size:12px;color:#a7f3d0;border:1px solid #14532d;background:#052e16;padding:4px 9px;border-radius:999px}
    .left,.right{background:rgba(17,24,39,.96);border-right:1px solid var(--border);overflow:auto;padding:14px}.right{border-right:none;border-left:1px solid var(--border)}
    #map{height:100%;width:100%;background:#030712}.section{border:1px solid var(--border);border-radius:12px;background:rgba(24,34,53,.72);padding:10px;margin-bottom:10px}.section h3{font-size:14px;margin:0 0 10px;color:#fff}
    label{display:block;font-size:12px;color:var(--muted);margin:9px 0 4px} select,input{width:100%;background:#0b1220;color:#e5e7eb;border:1px solid #334155;border-radius:8px;padding:8px;outline:none} input[type=file]{padding:7px;font-size:12px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.btn{width:100%;border:0;border-radius:9px;padding:9px 10px;margin-top:7px;background:#2563eb;color:white;font-weight:600;cursor:pointer}.btn:hover{filter:brightness(1.1)}.btn.green{background:#16a34a}.btn.gray{background:#475569}.btn.red{background:#dc2626}.btn.orange{background:#ea580c}
    .hint{font-size:12px;color:var(--muted);line-height:1.6}.status{font-size:12px;color:#cbd5e1;line-height:1.6;white-space:pre-wrap;max-height:160px;overflow:auto}.stat{display:grid;grid-template-columns:1fr auto;gap:8px;font-size:13px;padding:4px 0;border-bottom:1px dashed #334155}.stat:last-child{border-bottom:0}.badge{display:inline-block;padding:2px 6px;border-radius:6px;background:#334155;font-size:12px}.hidden{display:none!important}.divider{height:1px;background:#263244;margin:10px 0}.toolrow{display:flex;gap:8px}.toolrow .btn{margin-top:0}.leaflet-popup-content{font-family:"Microsoft YaHei";font-size:13px}.popup-input{width:90px;color:#111;background:#fff;border:1px solid #999;border-radius:4px;padding:3px}.wp-dot{width:28px;height:28px;border-radius:999px;background:#2563eb;color:#fff;border:2px solid #fff;box-shadow:0 2px 10px rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}.wp-dot.start{background:#f97316}.insert-plus{width:20px;height:20px;border-radius:999px;background:rgba(34,197,94,.55);color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.75);box-shadow:0 1px 5px rgba(0,0,0,.18);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;line-height:18px;cursor:pointer;opacity:.55;transition:all .15s}.insert-plus:hover{opacity:.85;background:rgba(34,197,94,.75);transform:scale(1.04)}.nofly-vertex{width:12px;height:12px;border-radius:999px;background:#ef4444;border:2px solid #fff}.mini-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.mini-actions .btn{margin-top:8px}.compact-note{font-size:12px;color:#a7f3d0;margin-top:6px;line-height:1.4}.switch-card{height:37px;display:flex;align-items:center;gap:8px;background:#0b1220;border:1px solid #334155;border-radius:8px;padding:0 10px;margin-top:4px;color:#e5e7eb;font-size:12px}.switch-card input{width:auto;margin:0}.group-label{background:#111827;color:#fff;border:1px solid #fff;border-radius:10px;padding:2px 6px;font-size:12px;font-weight:800;box-shadow:0 1px 6px rgba(0,0,0,.45)}
  </style>
</head>
<body>
<div class="app">
  <div class="top"><div class="brand">航线规划器</div><span class="pill">自动航线 / 手动航点 / KMZ导出</span></div>
  <aside class="left">
    <div class="section"><h3>一、导入任务</h3><input id="fileInput" type="file" accept=".kml,.kmz" multiple><button class="btn" onclick="importFiles()">导入 KML / KMZ</button></div>
    <div class="section" id="droneSection"><h3>二、机型选择</h3><label>无人机型号</label><select id="droneModel" onchange="onDroneChanged()"><option value="mini4pro">Mini 4 Pro（消费机）</option><option value="m4pro">御4 Pro（消费机）</option><option value="air3s">Air 3 / Air 3S（按Mini4Pro拍照动作）</option><option value="m3e">御3E（行业机）</option><option value="m3m">御3M（行业机）</option><option value="m3t">御3T（行业机）</option><option value="m4e">御4E（行业机）</option><option value="m4t">御4T（行业机）</option><option value="m300">M300 RTK（行业机）</option><option value="m350">M350 RTK（行业机）</option><option value="m400">M400（待样本校准）</option><option value="litox1">Lito X1</option><option value="wpml">DJI WPML 通用</option><option value="preview">通用 KML 预览</option></select><div id="payloadWrap" class="hidden"><label>负载型号</label><select id="payloadModel" onchange="onDroneChanged()"><option value="h20t">H20T</option><option value="p1">P1（保守模式）</option><option value="l1">L1（保守模式）</option></select></div><div id="droneHint" class="compact-note"></div></div>
    <div class="section" id="commonParams"><h3>三、飞行参数</h3><div class="row"><div><label>飞行高度 m</label><input id="height" type="number" value="80"></div><div><label>飞行速度 m/s</label><input id="speed" type="number" value="10"></div></div><div class="row"><div><label>云台角度 °</label><input id="gimbal" type="number" value="-90"></div><div id="hoverWrap"><label>悬停秒数</label><input id="hover" type="number" value="0"></div></div><div id="enterpriseTurnWrap"><label>行业机转弯方式</label><select id="enterpriseTurnMode"><option value="coordinateTurn">1. 协调转弯，不过点提前转弯</option><option value="straightStop" selected>2. 直线飞行，飞行器到点停</option><option value="smoothPass">3. 平滑过点，提前转弯</option><option value="curveStop">4. 曲线飞行，飞行器到点停</option><option value="curvePass">5. 曲线飞行，飞行器到点不停</option></select></div><div class="row"><div id="takeoffHeightWrap"><label>起飞安全高度 m</label><input id="takeoffHeight" type="number" value="80"></div></div></div>
    <div class="section"><h3>四、航线模式</h3><div class="tabbar"><button id="tabAuto" class="tab active" onclick="setPlanMode('auto')">自动生成航线</button><button id="tabManual" class="tab" onclick="setPlanMode('manual')">手动绘制航点</button></div></div>
    <div class="section" id="autoTemplateSection"><h3>自动航线</h3><label>任务模板</label><select id="templateType" onchange="onTemplateChanged()"><option value="sanzi">三资巡查</option><option value="ortho">正射测绘</option><option value="oblique">倾斜摄影</option></select></div>
    <div class="section" id="sanziParams"><h3>三资巡查参数</h3><div class="row"><div><label>每图斑照片数</label><input id="photosPerPlot" type="number" value="1" min="1"></div><div><label>每图斑最多照片数</label><input id="maxPhotos" type="number" value="10" min="1"></div></div><label>大面积阈值 ㎡</label><input id="areaThreshold" type="number" value="2000"><div id="actionWrap"><label>航点动作（行业机）</label><select id="pointAction"><option value="photo">拍照</option><option value="hover">悬停</option><option value="video">录像</option></select></div><div id="consumerActionTip" class="hint hidden">消费机按机型库固定动作导出。</div><label>航线顺序方案</label><select id="routeOrder" onchange="onRouteOrderChanged()"><option value="sortie" selected>按信号半径分架次</option><option value="aircraft">按照飞机数量规划</option><option value="region">区域优先</option><option value="shortest">最短距离</option></select><div id="aircraftCountWrap" class="hidden"><label>飞机数量</label><input id="aircraftCount" type="number" value="2" min="1" max="6"><div class="hint">按连续区域切分，多台飞机各飞一片，避免航线穿插。</div></div><label>单个作业点控制半径 m</label><input id="signalRadius" type="number" value="1400"></div>
    <div class="section hidden" id="orthoParams"><h3>正射测绘参数</h3><div class="row"><div><label>航向重叠率 %</label><input id="frontOverlap" type="number" value="80"></div><div><label>旁向重叠率 %</label><input id="sideOverlap" type="number" value="70"></div></div><label>边界扩展 m</label><input id="buffer" type="number" value="20"></div>
    <div class="section hidden" id="obliqueParams"><h3>倾斜摄影参数</h3><div class="row"><div><label>航向重叠率 %</label><input id="obFrontOverlap" type="number" value="80"></div><div><label>旁向重叠率 %</label><input id="obSideOverlap" type="number" value="70"></div></div><label>边界扩展 m</label><input id="obBuffer" type="number" value="20"></div>
    <div class="section hidden" id="manualParams"><h3>手动绘制航点</h3><div class="mini-actions"><button id="manualDrawBtn" class="btn green" onclick="toggleManualDraw()">开始绘制</button><button class="btn gray" onclick="finishManualDraw()">生成航点</button></div><div class="mini-actions"><button class="btn orange" onclick="toggleSnap()">航点吸附：开</button><button class="btn red" onclick="clearManualWaypoints()">清空手动航点</button></div></div>
    <div class="section"><h3>五、禁飞区</h3><div class="mini-actions"><button class="btn red" onclick="startNoFlyDraw()">绘制禁飞区</button><button class="btn gray" onclick="clearNoFlyZones()">清空禁飞区</button></div><div id="noflyInfo" class="hint">禁飞区：0 个；绘制时双击确认，航线自动更新。</div></div>
    <div class="section"><h3>六、生成与输出</h3><button class="btn green" onclick="generateMission()">生成 / 刷新航线</button><label>输出方式</label><select id="exportMode" onchange="onExportModeChanged()"><option value="sortie" selected>按航线任务分组（默认）</option><option value="split">按航点数量切割（应急）</option></select><div id="splitCountWrap" class="hidden"><label>最多航点</label><input id="splitCount" type="number" value="500"></div><div class="mini-actions"><button class="btn orange" onclick="previewSelectedGroups()">预览</button><button class="btn green" onclick="exportSelectedKMZ()">一键导出 KMZ+高清图+任务图KML</button></div></div>
  </aside>
  <main id="map"></main>
  <aside class="right">
    <div class="section"><h3>航点设置</h3><div id="selectedInfo" class="hint">点击航点后可修改、删除、插入或设为起飞点。手动绘制的航点同样在这里修改。</div><div id="editPanel" class="hidden"><label>航点编号</label><input id="editIndex" readonly><div class="row"><div><label>高度</label><input id="editHeight" type="number"></div><div><label>速度</label><input id="editSpeed" type="number"></div></div><div class="row"><div><label>动作</label><select id="editAction"><option value="photo">拍照</option><option value="video">录像</option><option value="hover">悬停</option></select></div><div><label>云台</label><input id="editGimbal" type="number"></div></div><button class="btn green" onclick="saveSelectedWaypoint()">更新航线</button><button class="btn orange" onclick="setTakeoffFromSelected()">当前航点设为起飞点</button><button class="btn gray" onclick="insertWaypointAfterSelected()">在当前航点后增加航点</button><button class="btn red" onclick="deleteSelectedWaypoint()">删除航点</button><div id="takeoffInfo" class="hint">未设置起飞点。</div></div></div>
    <div class="section"><h3>任务统计</h3><div class="stat"><span>图斑数量</span><b id="statPoly">0</b></div><div class="stat"><span>航点数量</span><b id="statWp">0</b></div><div class="stat"><span>航线距离</span><b id="statDist">0 km</b></div><div class="stat"><span>当前模板</span><b id="statTpl">三资巡查</b></div></div>
    <div class="section"><h3>状态</h3><div class="status" id="status">准备就绪。</div></div>
  </aside>
</div>
<script>
let map, polyLayer, routeLayer, markerLayer, noFlyLayer, noFlyTempLayer, groupPreviewLayer;
let routePreviewDim=false; let groupPreviewOn=false; let previewGroupsData=[]; let previewGroupTitle=''; let previewColorMap=new Map(); let planMode='auto'; let manualDraw=false; let snapEnabled=true; let polygons=[]; let waypoints=[]; let selectedIndex=-1; let takeoffPoint=null; let noFlyZones=[]; let noFlyDraft=[];
const DRONE_PROFILES={
  mini4pro:{name:'Mini 4 Pro',type:'consumer',ns:'http://www.uav.com/wpmz/1.0.2',drone:[68,0],payload:null,shoot:'takePhoto',consumerAction:'photoGimbal',consumerTakePhoto:true,supportsActions:false,defaultHeight:60,defaultSpeed:10,note:'按 Mini4 Pro 原始样本：drone=68-0，支持 takePhoto + 云台动作'},
  m4pro:{name:'御4 Pro',type:'consumer',ns:'http://www.uav.com/wpmz/1.0.2',drone:[68,0],payload:null,shoot:'takePhoto',consumerAction:'photoGimbal',consumerTakePhoto:true,supportsActions:false,defaultHeight:92,defaultSpeed:10,note:'按御4 Pro 原始样本：drone=68-0，支持 takePhoto + 云台动作'},
  air3s:{name:'Air 3 / Air 3S（按Mini4Pro拍照动作）',type:'consumer',ns:'http://www.uav.com/wpmz/1.0.2',drone:[68,0],payload:null,shoot:'takePhoto',consumerAction:'photoGimbal',consumerTakePhoto:true,supportsActions:false,defaultHeight:60,defaultSpeed:10,note:'Air3/Air3S：按 Mini4 Pro 兼容方式输出 takePhoto + 云台动作'},
  litox1:{name:'Lito X1',type:'consumer',ns:'http://www.uav.com/wpmz/1.0.2',drone:[68,0],payload:null,shoot:'takePhoto',consumerAction:'photoGimbal',consumerTakePhoto:true,supportsActions:false,defaultHeight:60,defaultSpeed:10,note:'Lito X1：按三资巡查需求写入 takePhoto + 云台动作；drone=68-0'},
  m3e:{name:'御3E',type:'enterprise',ns:'http://www.dji.com/wpmz/1.0.6',drone:[77,0],payload:[66,0,0],lens:0,shoot:'takePhoto',supportsActions:true,supportsTerrainFollow:false,turnModes:['coordinateTurn','toPointAndPassWithContinuityCurvature','toPointAndStopWithDiscontinuityCurvature','toPointAndStopWithContinuityCurvature'],defaultHeight:80,defaultSpeed:10,note:'行业机样本：drone=77-0，payload=66-0，支持起飞安全高度/负载/航点动作'},
  m3m:{name:'御3M',type:'enterprise',ns:'http://www.dji.com/wpmz/1.0.6',drone:[77,2],payload:[68,0,0],lens:0,shoot:'takePhoto',supportsActions:true,supportsTerrainFollow:false,turnModes:['coordinateTurn','toPointAndPassWithContinuityCurvature','toPointAndStopWithDiscontinuityCurvature','toPointAndStopWithContinuityCurvature'],defaultHeight:80,defaultSpeed:10,note:'按御3M样本适配：drone=77-2，payload=68-0，航点拍照使用 takePhoto'},
  m3t:{name:'御3T',type:'enterprise',ns:'http://www.dji.com/wpmz/1.0.6',drone:[77,1],payload:[67,0,0],lens:0,shoot:'orientedShoot',supportsActions:true,supportsTerrainFollow:false,turnModes:['coordinateTurn','toPointAndPassWithContinuityCurvature','toPointAndStopWithDiscontinuityCurvature','toPointAndStopWithContinuityCurvature'],defaultHeight:80,defaultSpeed:10,note:'行业机样本：drone=77-1，payload=67-0，支持起飞安全高度/负载/航点动作'},
  m4e:{name:'御4E',type:'enterprise',ns:'http://www.dji.com/wpmz/1.0.6',drone:[99,0],payload:[88,0,0],lens:1,shoot:'orientedShoot',supportsActions:true,supportsTerrainFollow:false,turnModes:['coordinateTurn','toPointAndPassWithContinuityCurvature','toPointAndStopWithDiscontinuityCurvature','toPointAndStopWithContinuityCurvature'],defaultHeight:100,defaultSpeed:10,note:'行业机样本：drone=99-0，payload=88-0，支持起飞安全高度/负载/航点动作'},
  m4t:{name:'御4T',type:'enterprise',ns:'http://www.dji.com/wpmz/1.0.6',drone:[99,1],payload:[89,0,0],lens:0,shoot:'orientedShoot',supportsActions:true,supportsTerrainFollow:false,turnModes:['coordinateTurn','straightStop','smoothPass','curveStop','curvePass'],defaultHeight:100,defaultSpeed:10,note:'御4T按新样本适配：drone=99-1，payload=89-0，统一相对起飞点高度'},
  m300:{name:'M300 RTK',type:'enterprise',ns:'http://www.dji.com/wpmz/1.0.6',drone:[60,0],payloadSelector:true,payload:null,lens:0,shoot:'orientedShoot',supportsActions:true,supportsTerrainFollow:false,turnModes:['coordinateTurn','straightStop','smoothPass','curveStop','curvePass'],defaultHeight:100,defaultSpeed:10,note:'M300 RTK：官方WPML机型编号 60-0；负载请在下方选择'},
  m350:{name:'M350 RTK',type:'enterprise',ns:'http://www.dji.com/wpmz/1.0.6',drone:[89,0],payloadSelector:true,payload:null,lens:0,shoot:'orientedShoot',supportsActions:true,supportsTerrainFollow:false,turnModes:['coordinateTurn','straightStop','smoothPass','curveStop','curvePass'],defaultHeight:100,defaultSpeed:10,note:'M350 RTK：官方WPML机型编号 89-0；负载请在下方选择'},
  m400:{name:'M400（待样本校准）',type:'enterprise',ns:'http://www.dji.com/wpmz/1.0.6',drone:null,payloadSelector:true,payload:null,lens:0,shoot:'orientedShoot',supportsActions:true,supportsTerrainFollow:false,turnModes:['coordinateTurn','straightStop','smoothPass','curveStop','curvePass'],defaultHeight:100,defaultSpeed:10,note:'M400：先提供入口和负载选择；官方公开WPML枚举未稳定确认，不写死未知机型编号，需用用户原厂样本校准'},
  wpml:{name:'DJI WPML 通用',type:'consumer',ns:'http://www.uav.com/wpmz/1.0.2',drone:[68,0],payload:null,shoot:'gimbalOnly',consumerAction:'gimbalOnly',consumerTakePhoto:false,supportsActions:false,defaultHeight:60,defaultSpeed:10,note:'未知消费机兜底：优先保证 DJI 能读取，不强写 takePhoto'},
  preview:{name:'通用 KML 预览',type:'preview',ns:'http://www.uav.com/wpmz/1.0.2',drone:null,payload:null,shoot:'takePhoto',supportsActions:false,defaultHeight:60,defaultSpeed:10,note:'只建议导出 KML 预览'}
};
const PAYLOAD_PROFILES={
  h20t:{name:'H20T',payload:[43,0,0],lens:0,shoot:'orientedShoot',focalLength:24,note:'H20T：官方WPML负载编号 43-0，支持定向拍照/变焦类字段'},
  p1:{name:'P1（保守模式）',payload:null,lens:0,shoot:'takePhoto',focalLength:24,note:'P1：先提供选择入口，未查到稳定公开WPML负载枚举，本版不强写payloadInfo，防止格式不支持'},
  l1:{name:'L1（保守模式）',payload:null,lens:0,shoot:'takePhoto',focalLength:24,note:'L1：先提供选择入口，未查到稳定公开WPML负载枚举，本版不强写payloadInfo，防止格式不支持'}
};
function activeProfile(){
  const base=DRONE_PROFILES[droneModel.value]||DRONE_PROFILES.wpml;
  if(!base.payloadSelector) return base;
  const pm=(document.getElementById('payloadModel')&&PAYLOAD_PROFILES[payloadModel.value])||PAYLOAD_PROFILES.h20t;
  return Object.assign({},base,{name:`${base.name} + ${pm.name}`,payload:pm.payload,lens:pm.lens,shoot:pm.shoot||base.shoot,focalLength:pm.focalLength||24,payloadNote:pm.note});
}
const tplName={sanzi:'三资巡查',ortho:'正射测绘',oblique:'倾斜摄影'};
function log(msg){document.getElementById('status').textContent = new Date().toLocaleTimeString()+'  '+msg+'\n'+document.getElementById('status').textContent;}
function setPlanMode(mode){
  planMode=mode||'auto';
  const auto=planMode==='auto';
  document.getElementById('tabAuto').classList.toggle('active',auto);
  document.getElementById('tabManual').classList.toggle('active',!auto);
  ['autoTemplateSection','sanziParams','orthoParams','obliqueParams'].forEach(id=>{const el=document.getElementById(id); if(el) el.classList.toggle('hidden',!auto || (id==='orthoParams'&&templateType.value!=='ortho') || (id==='obliqueParams'&&templateType.value!=='oblique') || (id==='sanziParams'&&templateType.value!=='sanzi'));});
  const manual=document.getElementById('manualParams'); if(manual) manual.classList.toggle('hidden',auto);
  if(!auto){ manualDraw=true; updateManualDrawButton(); log('已进入手动绘制模式：点击地图生成航点。'); }
  else { manualDraw=false; updateManualDrawButton(); onTemplateChanged(); }
}
function updateManualDrawButton(){ const b=document.getElementById('manualDrawBtn'); if(!b) return; b.textContent=manualDraw?'停止绘制':'开始绘制'; b.classList.toggle('manual-on',manualDraw); }
function toggleManualDraw(){ manualDraw=!manualDraw; updateManualDrawButton(); log(manualDraw?'手动绘制已开启。':'手动绘制已暂停。'); }
function finishManualDraw(){ manualDraw=false; updateManualDrawButton(); waypoints=insertNoFlyDetours(waypoints.filter(w=>!pointInAnyNoFly([w.lat,w.lng]))); drawRoute(); updateStats(); log(`手动航点已生成：${waypoints.length} 个，可继续编辑或导出。`); }
function toggleSnap(){ snapEnabled=!snapEnabled; const btn=event&&event.currentTarget; if(btn) btn.textContent=`航点吸附：${snapEnabled?'开':'关'}`; log(`航点吸附已${snapEnabled?'开启':'关闭'}。`); }
function clearManualWaypoints(){ if(!confirm('确定清空当前手动航点吗？')) return; waypoints=[]; selectedIndex=-1; drawRoute(); updateStats(); log('已清空手动航点。'); }

async function importFiles(){

  polygons=[]; waypoints=[]; takeoffPoint=null; selectedIndex=-1;
  polyLayer.clearLayers(); routeLayer.clearLayers(); markerLayer.clearLayers(); if(groupPreviewLayer) groupPreviewLayer.clearLayers(); resetGroupPreview();
  let importedWp=0, importedPoly=0;
  for(const f of files){
    try{
      let texts=[];
      if(f.name.toLowerCase().endsWith('.kmz')){
        const zip=await JSZip.loadAsync(await f.arrayBuffer());
        const names=Object.keys(zip.files).filter(n=>!zip.files[n].dir);
        const wpmlName=names.find(n=>n.toLowerCase().endsWith('waylines.wpml'));
        const tplName=names.find(n=>n.toLowerCase().endsWith('template.kml'));
        if(wpmlName){ const text=await zip.files[wpmlName].async('text'); const wps=parseKMLWaypoints(text); if(wps.length){ waypoints.push(...wps); importedWp+=wps.length; log(`导入 ${f.name}，读取航点 ${wps.length} 个，可二次修改。`); } }
        const kmlCandidates=names.filter(n=>n.toLowerCase().endsWith('.kml'));
        for(const n of kmlCandidates){ texts.push(await zip.files[n].async('text')); }
        if(!wpmlName && !texts.length) throw new Error('KMZ 内没有 KML/WPML');
      } else {
        texts=[await f.text()];

        const ps=parseKMLPolygons(text); if(ps.length){ polygons.push(...ps); importedPoly+=ps.length; }
        const wps=parseKMLWaypoints(text); if(wps.length && !f.name.toLowerCase().endsWith('.kmz')){ waypoints.push(...wps); importedWp+=wps.length; }
      }
      if(texts.length && !f.name.toLowerCase().endsWith('.kmz')) log(`导入 ${f.name} 完成。`);
    }catch(e){log(`导入失败 ${f.name}: ${e.message}`)}

function parseKMLPolygons(text){
  const xml=new DOMParser().parseFromString(text,'text/xml');
  const result=[];
  const parseCoords=(raw)=>String(raw||'').trim().split(/\s+/)
    .map(s=>s.split(',').map(Number))
    .filter(a=>a.length>=2&&!isNaN(a[0])&&!isNaN(a[1]))
    .map(a=>[a[1],a[0]]);
  const getChildrenByName=(el,name)=>[...el.children].filter(x=>x.localName===name || x.tagName===name);
  const placemarks=[...xml.getElementsByTagName('Placemark')];
  for(const pm of placemarks){
    const polygons=[...pm.getElementsByTagName('Polygon')];
    for(const poly of polygons){
      // 只读取外环 outerBoundaryIs，不能把 innerBoundaryIs 洞环当成独立图斑；
      // 旧代码读取所有 coordinates，本文件 1474 个外环 + 952 个内环 = 2426，所以会多出 952 个。
      const outers=[...poly.getElementsByTagName('outerBoundaryIs')];
      for(const outer of outers){
        const ring=outer.getElementsByTagName('LinearRing')[0];
        if(!ring) continue;
        const c=ring.getElementsByTagName('coordinates')[0];
        if(!c) continue;
        const pts=parseCoords(c.textContent);
        if(pts.length>=3) result.push(pts);
      }
    }
  }
  // 兼容极少数非标准 KML：没有 Polygon/outerBoundaryIs 时，才退回读取 coordinates。
  if(result.length===0){
    const coords=[...xml.getElementsByTagName('coordinates')];
    for(const c of coords){
      const pts=parseCoords(c.textContent);
      if(pts.length>=3) result.push(pts);
    }
  }
  return result;
}

function parseKMLWaypoints(text){
  const xml=new DOMParser().parseFromString(text,'text/xml');
  const placemarks=[...xml.getElementsByTagName('Placemark')];
  const out=[];
  const getLocal=(el,name)=>[...el.getElementsByTagName('*')].find(x=>x.localName===name);
  const getAllLocal=(el,name)=>[...el.getElementsByTagName('*')].filter(x=>x.localName===name);
  placemarks.forEach((pm,i)=>{
    const point=pm.getElementsByTagName('Point')[0]; if(!point) return;
    const c=point.getElementsByTagName('coordinates')[0]; if(!c) return;
    const parts=String(c.textContent||'').trim().split(/\s+/)[0].split(',').map(Number);
    if(parts.length<2 || isNaN(parts[0]) || isNaN(parts[1])) return;
    const hasWpml=[...pm.getElementsByTagName('*')].some(x=>String(x.localName||'').startsWith('waypoint')||x.localName==='index'||x.localName==='executeHeight'||x.localName==='height'||x.localName==='actionGroup');
    if(!hasWpml && placemarks.length>1){
      const nm=(pm.getElementsByTagName('name')[0]?.textContent||'').trim();
      if(!/航点|waypoint|wp|点/i.test(nm)) return;
    }
    const num=(name,def)=>{ const el=getLocal(pm,name); const v=el?Number(el.textContent):NaN; return Number.isFinite(v)?v:def; };
    const actions=getAllLocal(pm,'actionActuatorFunc').map(x=>String(x.textContent||'').trim());
    let act='photo'; if(actions.some(t=>/hover/i.test(t))) act='hover'; else if(actions.some(t=>/record/i.test(t))) act='video';
    let zoomFocalLength=null, shootFocalLength=null;
    const actionNodes=getAllLocal(pm,'action');
    actionNodes.forEach(a=>{
      const func=getLocal(a,'actionActuatorFunc')?.textContent?.trim()||'';
      const focal=Number(getLocal(a,'focalLength')?.textContent||'');
      if(func==='zoom' && Number.isFinite(focal)) zoomFocalLength=focal;
      if(func==='orientedShoot' && Number.isFinite(focal)) shootFocalLength=focal;
    });
    const w=baseWp(parts[1],parts[0],{height:num('executeHeight',num('height',Number(height.value)||80)),speed:num('waypointSpeed',Number(speed.value)||10),gimbal:num('gimbalPitchAngle',num('waypointGimbalPitchAngle',Number(gimbal.value)||-90)),action:act,imported:true,regionType:'导入航线'});
    if(zoomFocalLength) w.zoomFocalLength=zoomFocalLength;
    if(shootFocalLength) w.focalLength=shootFocalLength;
    if(actions.length) w.importedActions=actions;
    out.push(w);
  });
  if(!out.length){
    const line=xml.getElementsByTagName('LineString')[0];
    const c=line&&line.getElementsByTagName('coordinates')[0];
    if(c){
      String(c.textContent||'').trim().split(/\s+/).forEach(raw=>{
        const parts=raw.split(',').map(Number);
        if(parts.length>=2 && !isNaN(parts[0]) && !isNaN(parts[1])) out.push(baseWp(parts[1],parts[0],{height:Number(height.value)||80,speed:Number(speed.value)||10,gimbal:Number(gimbal.value)||-90,action:'photo',imported:true,regionType:'导入航线'}));
      });
    }
  }
  return out;
}

function baseWp(lat,lng,extra={}){return {lat,lng,height:+height.value||80,speed:+speed.value||10,gimbal:+gimbal.value||-90,hover:+hover.value||0,action:pointAction?pointAction.value:'photo',...extra};}
function generateSanzi(){
  const per=Math.max(1,+photosPerPlot.value||1), max=Math.max(1,+maxPhotos.value||10), thr=+areaThreshold.value||2000;
  polygons.forEach((poly,idx)=>{
    const area=polyAreaMeters(poly);
    let n=per;
    if(isLongNarrowPolygon(poly)) n=Math.min(max, Math.max(2, autoLongNarrowCount(poly,max)));
    else if(area>thr) n=Math.min(max, Math.max(per, Math.ceil(area/thr)));
    const pts=pointsInsidePolygonEven(poly,n);
    pts.forEach(p=>waypoints.push(baseWp(p[0],p[1],{region:idx,regionType:isLongNarrowPolygon(poly)?'狭长图斑':'图斑'})));
  });

function generateOrtho(isOblique=false,gim=-90,dirName='正射'){
  const h=+height.value||120;
  const side=+(isOblique?obSideOverlap.value:sideOverlap.value)||70;
  const front=+(isOblique?obFrontOverlap.value:frontOverlap.value)||80;
  // 简化相机覆盖估算：地面覆盖约 0.8*高度；根据重叠率换算航线间距和拍照点间距。
  // 关键修复：消费机不能等距/等间隔拍照，所以必须把每个拍照位置写成独立航点。
  const lineSpacing=Math.max(6, h*(1-side/100)*0.8);
  const shotSpacing=Math.max(4, h*(1-front/100)*0.8);
  polygons.forEach((poly,idx)=>{
    const bb=bbox(poly); const stepLat=metersToLat(lineSpacing); let row=0;
    const startLat=bb.minLat + stepLat/2;
    for(let lat=startLat; lat<=bb.maxLat; lat+=stepLat){
      const intersections=[];
      for(let i=0,j=poly.length-1;i<poly.length;j=i++){
        const a=poly[i], b=poly[j];
        if((a[0]>lat)!=(b[0]>lat)){
          const lng=a[1]+(lat-a[0])*(b[1]-a[1])/(b[0]-a[0]); intersections.push(lng);
        }
      }
      intersections.sort((a,b)=>a-b);
      for(let k=0;k+1<intersections.length;k+=2){
        let a=intersections[k], b=intersections[k+1];
        const segLen=dist([lat,a],[lat,b]);
        const n=Math.max(2, Math.ceil(segLen/shotSpacing)+1);
        const pts=[];
        for(let s=0;s<n;s++){
          const t=n===1?0:s/(n-1);
          pts.push({lat:lat,lng:a+(b-a)*t});
        }
        if(row%2===1) pts.reverse();
        pts.forEach(pt=>waypoints.push(baseWp(pt.lat,pt.lng,{gimbal:gim,action:'photo',group:dirName,region:idx,regionType:'正射航线',grid:true,shotSpacing:shotSpacing,lineSpacing:lineSpacing})));
        row++;
      }
    }
  });
}
function generateOblique(){ generateOrtho(true,-90,'正射'); generateOrtho(true,-45,'东向'); generateOrtho(true,-45,'南向'); generateOrtho(true,-45,'西向'); generateOrtho(true,-45,'北向'); }
function metersToLngAtLat(m,lat){ return m/(111320*Math.max(0.2, Math.cos((lat||0)*Math.PI/180))); }
function polygonAxes(poly){
  const bb=bbox(poly), center=centroid(poly), lat0=center[0];
  const pts=poly.map(p=>({x:(p[1]-center[1])*111320*Math.cos(lat0*Math.PI/180), y:(p[0]-center[0])*111320}));
  let best=null;
  for(let a=0;a<180;a+=5){
    const th=a*Math.PI/180, ux=Math.cos(th), uy=Math.sin(th), vx=-uy, vy=ux;
    let minU=Infinity,maxU=-Infinity,minV=Infinity,maxV=-Infinity;
    pts.forEach(p=>{const u=p.x*ux+p.y*uy, v=p.x*vx+p.y*vy; minU=Math.min(minU,u); maxU=Math.max(maxU,u); minV=Math.min(minV,v); maxV=Math.max(maxV,v);});
    const len=maxU-minU, wid=maxV-minV, area=len*wid;

function isLongNarrowPolygon(poly){ const ax=polygonAxes(poly); return !!(ax && ax.wid>1 && ax.len/ax.wid>=4 && ax.len>=30); }

function longNarrowPoints(poly,n){

  const result=[], half=ax.len/2, shrink=.88;

    if(found && result.every(p=>dist({lat:p[0],lng:p[1]},{lat:found[0],lng:found[1]})>2)) result.push(found);

function candidatePoints(poly,n){
  const bb=bbox(poly), center=centroid(poly), pts=[];
  const area=Math.max(polyAreaMeters(poly),1), spacing=Math.max(8, Math.sqrt(area/Math.max(n*5,8)));

    for(let lng=bb.minLng+stepLng/2+(row%2?stepLng*.35:0); lng<=bb.maxLng && pts.length<n*80; lng+=stepLng){

function farthestSelect(poly,cands,n){

  let remain=cands.filter(p=>p!==selected[0]);
  while(remain.length && selected.length<n){
    let bi=0,bs=-1;
    remain.forEach((p,i)=>{ const s=Math.min(...selected.map(q=>dist({lat:p[0],lng:p[1]},{lat:q[0],lng:q[1]}))); if(s>bs){bs=s;bi=i;} });

function pointsInsidePolygonEven(poly,n){

function applyRoutePlan(){

  waypoints=waypoints.filter(w=>!pointInAnyNoFly([w.lat,w.lng]));
  if(mode==='shortest'){ waypoints=orderShortestDistance(waypoints); waypoints=insertNoFlyDetours(waypoints); drawRoute(); updateStats(); log('已按最短距离排序。'); return; }
  if(mode==='region'){ optimizeRoute(); return; }
  if(mode==='aircraft'){ waypoints=orderByAircraftCount(waypoints); waypoints=insertNoFlyDetours(waypoints); drawRoute(); updateStats(); logAircraftSummary(); return; }
  if(mode==='sortie'){ waypoints=orderBySignalSorties(waypoints); waypoints=insertNoFlyDetours(waypoints); drawRoute(); updateStats(); logSortieSummary(); return; }
}
function orderNearFromTakeoff(wps){
  const origin=takeoffPoint?{lat:takeoffPoint.lat,lng:takeoffPoint.lng}:regionCenter(wps);
  return wps.slice().sort((a,b)=>dist(origin,a)-dist(origin,b));
}
function orderShortestDistance(wps){
  if(wps.length<=2) return wps.slice();
  const remaining=wps.slice();
  const ordered=[];
  let current=takeoffPoint?{lat:takeoffPoint.lat,lng:takeoffPoint.lng}:remaining[0];
  while(remaining.length){
    let best=0, bs=Infinity;
    remaining.forEach((p,i)=>{ const score=routeScore(current,p); if(score<bs){bs=score;best=i;} });
    const p=remaining.splice(best,1)[0]; ordered.push(p); current=p;
  }
  return twoOptOpenPath(ordered,1800);
}
function orderBySignalSorties(wps){
  const radius=Math.max(300, Number(document.getElementById('signalRadius')?.value)||1400);
  const regions=buildFlightRegions(wps); if(!regions.length) return wps;
  const bases=[];
  regions.forEach(r=>{
    let best=-1, bd=Infinity;
    bases.forEach((b,i)=>{const d=dist(r.center,b.center); if(d<bd){bd=d; best=i;}});
    if(best>=0 && bd<radius*1.45){ bases[best].regions.push(r); bases[best].center=regionCenter(bases[best].regions.map(x=>x.center)); }
    else bases.push({center:r.center,regions:[r]});
  });
  const orderedBases=orderBases(bases);
  let ordered=[], current=takeoffPoint?{lat:takeoffPoint.lat,lng:takeoffPoint.lng}:null;
  orderedBases.forEach((base,bi)=>{
    const regs=orderRegionsFrom(base.regions,current||base.center);
    regs.forEach(r=>{ const seg=orderWaypointsInsideRegion(r.points,current); seg.forEach(p=>p.sortie=bi+1); ordered=ordered.concat(seg); if(seg.length) current=seg[seg.length-1]; });
  });
  return ordered;
}
function orderByAircraftCount(wps){
  const count=Math.max(1, Math.min(6, Number(document.getElementById('aircraftCount')?.value)||2));
  const regions=buildFlightRegions(wps); if(!regions.length) return wps;
  const lats=regions.map(r=>r.center.lat), lngs=regions.map(r=>r.center.lng);
  const lonSpread=Math.max(...lngs)-Math.min(...lngs), latSpread=Math.max(...lats)-Math.min(...lats);
  const sorted=regions.slice().sort((a,b)=> lonSpread>=latSpread ? a.center.lng-b.center.lng : b.center.lat-a.center.lat);
  const n=Math.max(1, Math.min(count, sorted.length));
  const chunks=[];
  for(let i=0;i<n;i++){
    const start=Math.floor(i*sorted.length/n), end=Math.floor((i+1)*sorted.length/n);
    chunks.push(sorted.slice(start,end));
  }
  let ordered=[];
  chunks.forEach((chunk,gi)=>{
    let current=takeoffPoint?{lat:takeoffPoint.lat,lng:takeoffPoint.lng}:regionCenter(chunk.map(x=>x.center));
    const regs=orderRegionsFrom(chunk,current);
    regs.forEach(r=>{
      const seg=orderWaypointsInsideRegion(r.points,current);
      seg.forEach(p=>{p.sortie=gi+1; p.aircraftGroup=gi+1;});
      ordered=ordered.concat(seg);
      if(seg.length) current=seg[seg.length-1];
    });
  });
  return ordered;
}
function logAircraftSummary(){
  const groups=aircraftGroups(false);
  const msg=groups.map((g,i)=>`第${i+1}台${g.length}点/${(routeDistance(g)/1000).toFixed(2)}km`).join('；');
  log(`已按${groups.length}台飞机规划：${msg}。各飞机任务按连续区域切分，不穿插。`);
}
function orderBases(bases){
  const remaining=bases.slice(), ordered=[]; let current=takeoffPoint?{lat:takeoffPoint.lat,lng:takeoffPoint.lng}:remaining[0]?.center;
  while(remaining.length){ let best=0,bd=Infinity; remaining.forEach((b,i)=>{const d=dist(current,b.center); if(d<bd){bd=d;best=i;}}); const b=remaining.splice(best,1)[0]; ordered.push(b); current=b.center; }
  return ordered;
}
function orderRegionsFrom(regions,start){
  const remaining=regions.slice(), ordered=[]; let current=start;
  while(remaining.length){ let best=0,bd=Infinity; remaining.forEach((r,i)=>{const d=dist(current,r.center); if(d<bd){bd=d;best=i;}}); const r=remaining.splice(best,1)[0]; ordered.push(r); current=r.center; }
  return ordered;
}
function logSortieSummary(){
  const groups={}; waypoints.forEach(w=>{const k=w.sortie||1; groups[k]=(groups[k]||0)+1;});
  const msg=Object.entries(groups).map(([k,v])=>`第${k}组 ${v} 个航点`).join('；');
  log(`已按信号距离分组排序：${msg}。建议每组切割导出一个 KMZ，到现场换起飞位置后执行。`);
}

function optimizeRoute(){
  if(waypoints.length<3){drawRoute();return;}
  // 区域优先飞行：先把同一图斑/同一片区的航点飞完，再切换到下一个区域。
  // 这样会牺牲一点理论最短距离，但能显著减少跨区域长线往返，更适合无人机实际作业。
  waypoints=waypoints.filter(w=>!pointInAnyNoFly([w.lat,w.lng]));
  const regions=buildFlightRegions(waypoints);
  if(!regions.length){drawRoute();return;}
  const orderedRegions=orderRegions(regions);
  let ordered=[];
  let current = takeoffPoint ? {lat:takeoffPoint.lat,lng:takeoffPoint.lng} : null;
  orderedRegions.forEach(region=>{
    const seg=orderWaypointsInsideRegion(region.points,current);
    ordered=ordered.concat(seg);
    if(seg.length) current=seg[seg.length-1];
  });
  waypoints=insertNoFlyDetours(ordered);
  selectedIndex=-1; drawRoute(); updateStats();
  log(`已按区域优先重新规划：${regions.length} 个区域，先飞完当前区域再去下一区域，减少长线往返`);
}

function buildFlightRegions(wps){
  const mapObj=new Map();
  wps.forEach((w,i)=>{
    const key=(w.region!==undefined && w.region!==null) ? `poly_${w.region}` : `auto_${nearestClusterKey(w,mapObj)}`;
    if(!mapObj.has(key)) mapObj.set(key,{key,points:[],center:null});
    mapObj.get(key).points.push(w);
  });
  const arr=[...mapObj.values()];
  arr.forEach(r=>{ r.center=regionCenter(r.points); r.points=dedupeClosePoints(r.points); });
  return arr.filter(r=>r.points.length);
}

function nearestClusterKey(w,mapObj){
  // 手工新增航点没有 region 时，自动并入 80 米内最近区域；否则单独成区。
  let bestKey=null, bestD=Infinity;
  for(const [k,r] of mapObj.entries()){
    if(!r.points.length) continue;
    const c=regionCenter(r.points); const d=dist(w,c);
    if(d<bestD){bestD=d;bestKey=k;}
  }
  if(bestKey && bestD<80) return bestKey;
  return Math.random().toString(36).slice(2);
}

function regionCenter(points){
  let lat=0,lng=0; points.forEach(p=>{lat+=p.lat;lng+=p.lng;});
  return {lat:lat/points.length,lng:lng/points.length};
}

function orderRegions(regions){
  const remaining=regions.slice();
  const ordered=[];
  let current=null;
  if(takeoffPoint) current={lat:takeoffPoint.lat,lng:takeoffPoint.lng};
  else {
    // 无起飞点时，从西南侧区域开始，减少突然穿插。
    remaining.sort((a,b)=>(a.center.lng-b.center.lng)||(a.center.lat-b.center.lat));
    current=remaining[0].center;
  }
  while(remaining.length){
    let best=0, bs=Infinity;
    remaining.forEach((r,i)=>{
      const entry=nearestPointInRegion(r.points,current);
      let score=dist(current,entry) + (segmentCrossesAnyNoFly(current,entry)?10000000:0);
      // 区域中心距离作为次要因素，避免刚摸到边缘又远距离穿插。
      score += dist(current,r.center)*0.25;
      if(score<bs){bs=score;best=i;}
    });
    const r=remaining.splice(best,1)[0]; ordered.push(r); current=r.center;
  }
  return ordered;
}

function nearestPointInRegion(points,current){
  if(!current) return points[0];
  let best=points[0], bd=Infinity;
  points.forEach(p=>{const d=dist(current,p); if(d<bd){bd=d;best=p;}});
  return best;
}

function orderWaypointsInsideRegion(points,entryFrom){
  if(points.length<=2) return points.slice();
  // 正射/倾斜本身已经是 S 型航线，保留原始生成顺序，只选择更近的一端进入，避免打乱行带。
  const hasGrid=points.some(p=>p.group);
  if(hasGrid){
    const normal=points.slice(); const rev=points.slice().reverse();
    if(entryFrom && dist(entryFrom,rev[0])<dist(entryFrom,normal[0])) return rev;
    return normal;
  }
  let startIdx=0;
  if(entryFrom){ let bd=Infinity; points.forEach((p,i)=>{const d=dist(entryFrom,p); if(d<bd){bd=d;startIdx=i;}}); }
  let remaining=points.filter((_,i)=>i!==startIdx);
  let ordered=[points[startIdx]];
  while(remaining.length){
    const last=ordered[ordered.length-1]; const prev=ordered.length>1?ordered[ordered.length-2]:entryFrom;
    let best=0, bs=Infinity;
    remaining.forEach((p,i)=>{const score=smartRouteScore(prev,last,p); if(score<bs){bs=score;best=i;}});
    ordered.push(remaining.splice(best,1)[0]);
  }
  return twoOptOpenPath(ordered,1200);
}

function dedupeClosePoints(points){
  const out=[];
  points.forEach(p=>{ if(!out.some(q=>dist(p,q)<0.3)) out.push(p); });
  return out;
}

function twoOptOpenPath(arr,limit){
  let best=arr.slice(), improved=true, cnt=0;
  while(improved && cnt<limit){
    improved=false;
    for(let i=1;i<best.length-2;i++){
      for(let k=i+1;k<best.length-1;k++){
        const d0=routeScore(best[i-1],best[i])+routeScore(best[k],best[k+1]);
        const d1=routeScore(best[i-1],best[k])+routeScore(best[i],best[k+1]);
        if(d1+0.01<d0){ best=[...best.slice(0,i),...best.slice(i,k+1).reverse(),...best.slice(k+1)]; improved=true; }
        cnt++; if(cnt>=limit) return best;
      }
    }
  }
  return best;
}

function insertWaypointBetween(idx,lat,lng){
  const prev=waypoints[idx];
  const next=waypoints[idx+1]||prev;
  const keepRegion=(prev.region!==undefined && prev.region===next.region)?prev.region:prev.region;
  const nw={...prev, lat, lng, height:prev.height, speed:prev.speed, gimbal:prev.gimbal, hover:prev.hover, action:prev.action, region:keepRegion, regionType:prev.regionType||'手动'};
  waypoints.splice(idx+1,0,nw);
  selectedIndex=idx+1; drawRoute(); selectWp(selectedIndex); updateStats();
  log(`已在航点 ${idx+1} 和 ${idx+2} 中间插入新航点`);
}
function insertWaypointAfterSelected(){
  if(selectedIndex<0){alert('请先点击一个航点');return;}
  const a=waypoints[selectedIndex];
  const b=waypoints[selectedIndex+1];

  if(b){ lat=(a.lat+b.lat)/2; lng=(a.lng+b.lng)/2; }
  else { lat=a.lat+metersToLat(15); lng=a.lng; }

}
function insertWaypointOnRoute(lat,lng){
  if(waypoints.length<2) return;
  const p={lat,lng}; let bestIdx=0, bestD=Infinity;
  for(let i=0;i<waypoints.length-1;i++){
    const d=pointToSegmentDistanceMeters(p,waypoints[i],waypoints[i+1]);
    if(d<bestD){bestD=d; bestIdx=i;}
  }
  insertWaypointBetween(bestIdx,lat,lng);
}
function pointToSegmentDistanceMeters(p,a,b){
  const lat0=p.lat*Math.PI/180; const kx=111320*Math.cos(lat0), ky=111320;
  const px=p.lng*kx, py=p.lat*ky, ax=a.lng*kx, ay=a.lat*ky, bx=b.lng*kx, by=b.lat*ky;
  const vx=bx-ax, vy=by-ay, wx=px-ax, wy=py-ay;
  const c1=vx*wx+vy*wy, c2=vx*vx+vy*vy; let t=c2?c1/c2:0; t=Math.max(0,Math.min(1,t));
  const x=ax+t*vx, y=ay+t*vy; return Math.hypot(px-x,py-y);
}

function smartRouteScore(prev,last,cand){
  let score=routeScore(last,cand);
  if(prev){
    const ang=turnAngle(prev,last,cand); // 0 直飞，180 掉头
    score += Math.pow(ang/180,1.35)*dist(last,cand)*0.65;
    if(ang>120) score += 120; // 尽量避免大角度回头
  }
  return score;
}
function turnAngle(a,b,c){
  const v1=[b.lng-a.lng,b.lat-a.lat], v2=[c.lng-b.lng,c.lat-b.lat];
  const n1=Math.hypot(v1[0],v1[1]), n2=Math.hypot(v2[0],v2[1]); if(!n1||!n2) return 0;
  let cos=(v1[0]*v2[0]+v1[1]*v2[1])/(n1*n2); cos=Math.max(-1,Math.min(1,cos));
  return Math.acos(cos)*180/Math.PI;
}

function canvasText(ctx,text,x,y,maxWidth){

  let s=String(text||'');

function overviewRouteColors(){ return ['#2563eb','#f97316','#7c3aed','#dc2626','#0891b2','#db2777','#0f766e','#a855f7','#b45309','#1d4ed8']; }

function tileY(lat,z){ const r=lat*Math.PI/180; return Math.floor((1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2*Math.pow(2,z)); }
function tileLng(x,z){ return x/Math.pow(2,z)*360-180; }

  return new Promise(resolve=>{
    const img=new Image(); let done=false;
    const finish=v=>{ if(!done){done=true; resolve(v);} };

async function drawImageryBasemap(ctx,minLat,minLng,maxLat,maxLng,cv,pad,top,right,bottom){
  try{
    let z=18, x1,y1,x2,y2;
    for(; z>=12; z--){
      x1=tileX(minLng,z); x2=tileX(maxLng,z); y1=tileY(maxLat,z); y2=tileY(minLat,z);

    ctx.save(); ctx.beginPath(); ctx.rect(pad,top,right-pad,bottom-top); ctx.clip();
    for(let x=x1;x<=x2;x++) for(let y=y1;y<=y2;y++){

      if(!img) continue;
      const lonA=tileLng(x,z), lonB=tileLng(x+1,z), latA=tileLat(y,z), latB=tileLat(y+1,z);

}

    const color=kmlColor(colors[gi%colors.length]);
    styles+=`<Style id="${sid}"><LineStyle><color>${color}</color><width>5</width></LineStyle></Style>`;
    const coords=g.map(w=>`${Number(w.lng).toFixed(10)},${Number(w.lat).toFixed(10)},${Number(w.height)||0}`).join(' ');
    body+=`<Placemark><name>任务${gi+1}_${g.length}航点_航线</name><styleUrl>#${sid}</styleUrl><description><![CDATA[切割任务:${gi+1}<br>航点数量:${g.length}<br>说明:本KML仅用于手机查看任务线，不包含航点。]]></description><LineString><tessellate>1</tessellate><coordinates>${coords}</coordinates></LineString></Placemark>`;
  });
  return `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>航线任务预览图_全部切割任务线</name>${styles}${body}</Document></kml>`;
}

function terrainFollowWaylineXml(){ return ''; }
function missionConfig(){
  const p=activeProfile();
  const takeoff=p.type==='enterprise'?`<wpml:takeOffSecurityHeight>${Number(takeoffHeight.value)||p.defaultHeight||80}</wpml:takeOffSecurityHeight>`:'';
  const drone=p.drone?`<wpml:droneInfo><wpml:droneEnumValue>${p.drone[0]}</wpml:droneEnumValue><wpml:droneSubEnumValue>${p.drone[1]}</wpml:droneSubEnumValue></wpml:droneInfo>`:'';
  const payload=p.payload?`<wpml:waylineAvoidLimitAreaMode>0</wpml:waylineAvoidLimitAreaMode><wpml:payloadInfo><wpml:payloadEnumValue>${p.payload[0]}</wpml:payloadEnumValue><wpml:payloadSubEnumValue>${p.payload[1]}</wpml:payloadSubEnumValue><wpml:payloadPositionIndex>${p.payload[2]}</wpml:payloadPositionIndex></wpml:payloadInfo>`:'';
  return `<wpml:missionConfig><wpml:flyToWaylineMode>safely</wpml:flyToWaylineMode><wpml:finishAction>goHome</wpml:finishAction><wpml:exitOnRCLost>executeLostAction</wpml:exitOnRCLost><wpml:executeRCLostAction>goBack</wpml:executeRCLostAction>${takeoff}<wpml:globalTransitionalSpeed>${Number(speed.value)||p.defaultSpeed||10}</wpml:globalTransitionalSpeed>${drone}${payload}</wpml:missionConfig>`;
}
function consumerWpmlPlacemark(w,i){
  const p=activeProfile();

  const gimbalFunc=i===0?'gimbalRotate':'gimbalEvenlyRotate';
  const gimbalParam=`<wpml:actionActuatorFuncParam>
              <wpml:gimbalHeadingYawBase>aircraft</wpml:gimbalHeadingYawBase>
              <wpml:gimbalRotateMode>absoluteAngle</wpml:gimbalRotateMode>
              <wpml:gimbalPitchRotateEnable>1</wpml:gimbalPitchRotateEnable>
              <wpml:gimbalPitchRotateAngle>${Number(w.gimbal)||0}</wpml:gimbalPitchRotateAngle>
              <wpml:gimbalRollRotateEnable>1</wpml:gimbalRollRotateEnable>
              <wpml:gimbalRollRotateAngle>0</wpml:gimbalRollRotateAngle>
              <wpml:gimbalYawRotateEnable>0</wpml:gimbalYawRotateEnable>
              <wpml:gimbalYawRotateAngle>0</wpml:gimbalYawRotateAngle>
              <wpml:gimbalRotateTimeEnable>0</wpml:gimbalRotateTimeEnable>
              <wpml:gimbalRotateTime>0</wpml:gimbalRotateTime>
              <wpml:payloadPositionIndex>0</wpml:payloadPositionIndex>
            </wpml:actionActuatorFuncParam>`;
  // 消费机三资巡查必须写入到点拍照。Mini4 Pro / 御4 Pro / Air3 / Air3S / Lito X1 均按 takePhoto + 云台动作导出，Air3系列使用Mini4 Pro兼容写法。
  const hasPhoto=!!p.consumerTakePhoto;

            <wpml:actionId>1</wpml:actionId>

        <wpml:waypointHeadingParam>
          <wpml:waypointHeadingMode>followWayline</wpml:waypointHeadingMode>
          <wpml:waypointHeadingAngle>0</wpml:waypointHeadingAngle>
          <wpml:waypointPoiPoint>0.000000,0.000000,0.000000</wpml:waypointPoiPoint>
          <wpml:waypointHeadingAngleEnable>1</wpml:waypointHeadingAngleEnable>
          <wpml:waypointHeadingPathMode>followBadArc</wpml:waypointHeadingPathMode>
          <wpml:waypointHeadingPoiIndex>0</wpml:waypointHeadingPoiIndex>
        </wpml:waypointHeadingParam>
        <wpml:waypointTurnParam>
          <wpml:waypointTurnMode>${i===0?'toPointAndStopWithContinuityCurvature':'toPointAndPassWithContinuityCurvature'}</wpml:waypointTurnMode>
          <wpml:waypointTurnDampingDist>0</wpml:waypointTurnDampingDist>
        </wpml:waypointTurnParam>
        <wpml:useStraightLine>0</wpml:useStraightLine>
        ${!hasPhoto?`<wpml:waypointGimbalHeadingParam>

        <wpml:actionGroup>

          <wpml:actionTrigger>
            <wpml:actionTriggerType>reachPoint</wpml:actionTriggerType>

function enterpriseTurnChoice(){ const el=document.getElementById('enterpriseTurnMode'); return el?el.value:'straightStop'; }
function enterpriseTurnModeValue(){
  const c=enterpriseTurnChoice();
  if(c==='coordinateTurn') return 'coordinateTurn';
  if(c==='straightStop') return 'toPointAndStopWithDiscontinuityCurvature';
  if(c==='smoothPass') return 'toPointAndPassWithContinuityCurvature';
  if(c==='curveStop') return 'toPointAndStopWithContinuityCurvature';
  if(c==='curvePass') return 'toPointAndPassWithContinuityCurvature';
  return 'toPointAndStopWithDiscontinuityCurvature';
}
function autoTurnDampingForIndex(i){
  const c=enterpriseTurnChoice();
  if(c==='straightStop' || c==='curveStop') return 0;
  const prev=waypoints[i-1], cur=waypoints[i], next=waypoints[i+1];
  const d1=prev&&cur?dist(prev,cur):999, d2=cur&&next?dist(cur,next):999;
  const d=Math.min(d1,d2);
  if(!Number.isFinite(d) || d<20) return 0;
  if(d<50) return 3;
  if(d<100) return 5;
  return 8;
}
function enterpriseTurnDampingDistValue(i=0){ return 0; }
function enterpriseUseStraightLineValue(){
  // 行业机统一不写直线强制通过，配合 0 截距，避免“航点转弯截距异常(1550)”。
  return 0;
}
function enterpriseGimbalActionParam(w,p){
  const pos=p.payload?p.payload[2]:0;
  return `<wpml:actionActuatorFuncParam>
    <wpml:gimbalRotateMode>absoluteAngle</wpml:gimbalRotateMode>
    <wpml:gimbalPitchRotateEnable>1</wpml:gimbalPitchRotateEnable>
    <wpml:gimbalPitchRotateAngle>${Number(w.gimbal)||-90}</wpml:gimbalPitchRotateAngle>
    <wpml:gimbalRollRotateEnable>0</wpml:gimbalRollRotateEnable>
    <wpml:gimbalRollRotateAngle>0</wpml:gimbalRollRotateAngle>
    <wpml:gimbalYawRotateEnable>0</wpml:gimbalYawRotateEnable>
    <wpml:gimbalYawRotateAngle>0</wpml:gimbalYawRotateAngle>
    <wpml:gimbalRotateTimeEnable>0</wpml:gimbalRotateTimeEnable>
    <wpml:gimbalRotateTime>0</wpml:gimbalRotateTime>
    <wpml:payloadPositionIndex>${pos}</wpml:payloadPositionIndex>
  </wpml:actionActuatorFuncParam>`;
}
function enterpriseShootActionParam(w,p,act,i){
  const pos=p.payload?p.payload[2]:0;
  const lens=(p.lens!==undefined&&p.lens!==null)?p.lens:0;
  if(act==='orientedShoot'){
    return `<wpml:actionActuatorFuncParam>
      <wpml:gimbalPitchRotateAngle>${Number(w.gimbal)||-90}</wpml:gimbalPitchRotateAngle>
      <wpml:gimbalRollRotateAngle>0</wpml:gimbalRollRotateAngle>
      <wpml:gimbalYawRotateAngle>0</wpml:gimbalYawRotateAngle>
      <wpml:focusX>0</wpml:focusX>
      <wpml:focusY>0</wpml:focusY>
      <wpml:focusRegionWidth>0</wpml:focusRegionWidth>
      <wpml:focusRegionHeight>0</wpml:focusRegionHeight>
      <wpml:focalLength>${Number(w.focalLength)||Number(w.zoomFocalLength)||24}</wpml:focalLength>
      <wpml:aircraftHeading>0</wpml:aircraftHeading>
      <wpml:accurateFrameValid>0</wpml:accurateFrameValid>
      <wpml:payloadPositionIndex>${pos}</wpml:payloadPositionIndex>
      <wpml:useGlobalPayloadLensIndex>${p.drone&&p.drone[0]===99?1:lens}</wpml:useGlobalPayloadLensIndex>
      ${p.drone&&p.drone[0]===99?'<wpml:payloadLensIndex>visable</wpml:payloadLensIndex>':''}
      <wpml:orientedCameraType>${p.payload?p.payload[0]:'normal'}</wpml:orientedCameraType>
      <wpml:orientedPhotoMode>normalPhoto</wpml:orientedPhotoMode>
    </wpml:actionActuatorFuncParam>`;
  }
  if(act==='hover') return `<wpml:actionActuatorFuncParam><wpml:hoverTime>${Number(w.hover)||1}</wpml:hoverTime></wpml:actionActuatorFuncParam>`;
  if(act==='startRecord') return `<wpml:actionActuatorFuncParam><wpml:payloadPositionIndex>${pos}</wpml:payloadPositionIndex><wpml:useGlobalPayloadLensIndex>${lens}</wpml:useGlobalPayloadLensIndex></wpml:actionActuatorFuncParam>`;
  return `<wpml:actionActuatorFuncParam>
    <wpml:fileSuffix>航点${i+1}</wpml:fileSuffix>
    <wpml:payloadPositionIndex>${pos}</wpml:payloadPositionIndex>
    <wpml:useGlobalPayloadLensIndex>${lens}</wpml:useGlobalPayloadLensIndex>
  </wpml:actionActuatorFuncParam>`;
}
function enterpriseZoomActionXml(w,p,actionId){
  const pos=p.payload?p.payload[2]:0;
  const focal=Number(w.zoomFocalLength)||Number(w.focalLength)||0;
  if(!focal) return '';
  return `<wpml:action>
      <wpml:actionId>${actionId}</wpml:actionId>
      <wpml:actionActuatorFunc>zoom</wpml:actionActuatorFunc>
      <wpml:actionActuatorFuncParam>
        <wpml:focalLength>${focal}</wpml:focalLength>
        <wpml:isUseFocalFactor>0</wpml:isUseFocalFactor>
        <wpml:payloadPositionIndex>${pos}</wpml:payloadPositionIndex>
      </wpml:actionActuatorFuncParam>
    </wpml:action>`;
}
function enterpriseWpmlPlacemark(w,i){
  const p=activeProfile();
  const act=w.action==='hover'?'hover':(w.action==='video'?'startRecord':p.shoot);
  let actionList='', aid=0;
  const zoomXml=enterpriseZoomActionXml(w,p,aid);
  if(zoomXml){ actionList+=zoomXml; aid++; }
  // 御4E/御4T 原厂样本动作里 orientedShoot 已包含云台角度，避免额外 gimbalRotate 造成格式不兼容。
  const m4Enterprise = p.drone && p.drone[0]===99;
  if(!m4Enterprise && act!=='hover' && act!=='startRecord'){
    actionList+=`<wpml:action>
      <wpml:actionId>${aid++}</wpml:actionId>
      <wpml:actionActuatorFunc>gimbalRotate</wpml:actionActuatorFunc>
      ${enterpriseGimbalActionParam(w,p)}
    </wpml:action>`;
  }
  actionList+=`<wpml:action>
      <wpml:actionId>${aid++}</wpml:actionId>
      <wpml:actionActuatorFunc>${act}</wpml:actionActuatorFunc>
      ${enterpriseShootActionParam(w,p,act,i)}
    </wpml:action>`;
  const actionXml=`<wpml:actionGroup>
    <wpml:actionGroupId>${i}</wpml:actionGroupId>
    <wpml:actionGroupStartIndex>${i}</wpml:actionGroupStartIndex>
    <wpml:actionGroupEndIndex>${i}</wpml:actionGroupEndIndex>
    <wpml:actionGroupMode>sequence</wpml:actionGroupMode>
    <wpml:actionTrigger><wpml:actionTriggerType>reachPoint</wpml:actionTriggerType></wpml:actionTrigger>
    ${actionList}
  </wpml:actionGroup>`;
  return `<Placemark>
    <name>航点${i+1}</name>
    <Point><coordinates>${Number(w.lng).toFixed(10)},${Number(w.lat).toFixed(10)}</coordinates></Point>
    <wpml:index>${i}</wpml:index>
    <wpml:height>${Number(w.height)||80}</wpml:height>
    <wpml:ellipsoidHeight>${Number(w.height)||80}</wpml:ellipsoidHeight>
    <wpml:executeHeight>${Number(w.height)||80}</wpml:executeHeight>
    <wpml:waypointSpeed>${Number(w.speed)||10}</wpml:waypointSpeed>
    <wpml:useGlobalHeight>1</wpml:useGlobalHeight>
    <wpml:waypointHeadingParam><wpml:waypointHeadingMode>followWayline</wpml:waypointHeadingMode><wpml:waypointHeadingAngle>0</wpml:waypointHeadingAngle><wpml:waypointPoiPoint>0.000000,0.000000,0.000000</wpml:waypointPoiPoint><wpml:waypointHeadingAngleEnable>0</wpml:waypointHeadingAngleEnable><wpml:waypointHeadingPathMode>followBadArc</wpml:waypointHeadingPathMode></wpml:waypointHeadingParam>
    <wpml:waypointTurnParam><wpml:waypointTurnMode>${enterpriseTurnModeValue()}</wpml:waypointTurnMode><wpml:waypointTurnDampingDist>0</wpml:waypointTurnDampingDist></wpml:waypointTurnParam>
    <wpml:useStraightLine>0</wpml:useStraightLine>
    <wpml:gimbalPitchAngle>${Number(w.gimbal)||-90}</wpml:gimbalPitchAngle>
    ${actionXml}
    <wpml:waypointGimbalHeadingParam><wpml:waypointGimbalPitchAngle>0</wpml:waypointGimbalPitchAngle><wpml:waypointGimbalYawAngle>0</wpml:waypointGimbalYawAngle></wpml:waypointGimbalHeadingParam>
    <wpml:isRisky>0</wpml:isRisky>
    <wpml:waypointWorkType>0</wpml:waypointWorkType>
  </Placemark>`;
}

function wpmlPlacemark(w,i){
  const p=activeProfile();
  return p.type==='consumer'?consumerWpmlPlacemark(w,i):enterpriseWpmlPlacemark(w,i);
}
function buildTemplateKml(wps){
  const p=activeProfile(); const t=Date.now();
  if(p.type==='consumer'){
    return `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2" xmlns:wpml="${p.ns}">
  <Document>
    <wpml:author>fly</wpml:author>
    <wpml:createTime>${t}</wpml:createTime>
    <wpml:updateTime>${t}</wpml:updateTime>
    ${missionConfig()}
  </Document>
</kml>`;
  }
  return `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2" xmlns:wpml="${p.ns}"><Document><wpml:author>fly</wpml:author><wpml:createTime>${t}</wpml:createTime><wpml:updateTime>${t}</wpml:updateTime>${missionConfig()}<Folder><wpml:templateType>waypoint</wpml:templateType><wpml:templateId>0</wpml:templateId><wpml:waylineCoordinateSysParam><wpml:coordinateMode>WGS84</wpml:coordinateMode><wpml:heightMode>relativeToStartPoint</wpml:heightMode><wpml:positioningType>GPS</wpml:positioningType></wpml:waylineCoordinateSysParam><wpml:autoFlightSpeed>${Number(speed.value)||10}</wpml:autoFlightSpeed><wpml:globalHeight>${Number(height.value)||80}</wpml:globalHeight><wpml:gimbalPitchMode>manual</wpml:gimbalPitchMode>${wps.map(wpmlPlacemark).join('')}</Folder></Document></kml>`;
}
function buildWaylinesWpml(wps){
  const p=activeProfile();
  const distanceTag=p.type==='consumer'?'<wpml:distance>0</wpml:distance><wpml:duration>0</wpml:duration>':'';

<kml xmlns="http://www.opengis.net/kml/2.2" xmlns:wpml="${p.ns}">

function buildKML(wps){ return `<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>航线</name><Style id="wp"><IconStyle><scale>0.8</scale><Icon><href>http://maps.google.com/mapfiles/kml/shapes/placemark_circle.png</href></Icon></IconStyle></Style><Placemark><name>航线</name><LineString><tessellate>1</tessellate><coordinates>${wps.map(w=>`${w.lng},${w.lat},${w.height}`).join(' ')}</coordinates></LineString></Placemark>${wps.map((w,i)=>`<Placemark><name>航点${i+1}</name><styleUrl>#wp</styleUrl><description><![CDATA[高度:${w.height}<br>速度:${w.speed}<br>动作:${w.action}<br>云台:${w.gimbal}<br>悬停:${w.hover}]]></description><Point><coordinates>${w.lng},${w.lat},${w.height}</coordinates></Point></Placemark>`).join('')}</Document></kml>`; }
function download(name,text,type){ const blob=new Blob([text],{type}); saveBlob(blob,name); }
function saveBlob(blob,name){ const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000); }
function bbox(poly){return {minLat:Math.min(...poly.map(p=>p[0])),maxLat:Math.max(...poly.map(p=>p[0])),minLng:Math.min(...poly.map(p=>p[1])),maxLng:Math.max(...poly.map(p=>p[1]))};}
function centroid(poly){let lat=0,lng=0; poly.forEach(p=>{lat+=p[0];lng+=p[1];}); return [lat/poly.length,lng/poly.length];}
function pointInPoly(pt,poly){const x=pt[1],y=pt[0];let inside=false;for(let i=0,j=poly.length-1;i<poly.length;j=i++){const xi=poly[i][1],yi=poly[i][0],xj=poly[j][1],yj=poly[j][0];const intersect=((yi>y)!=(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi+1e-12)+xi);if(intersect)inside=!inside;}return inside;}
function dist(a,b){const R=6371000, p1=a.lat!==undefined?[a.lat,a.lng]:a, p2=b.lat!==undefined?[b.lat,b.lng]:b; const dLat=(p2[0]-p1[0])*Math.PI/180,dLng=(p2[1]-p1[1])*Math.PI/180; const la1=p1[0]*Math.PI/180,la2=p2[0]*Math.PI/180; const h=Math.sin(dLat/2)**2+Math.cos(la1)*Math.cos(la2)*Math.sin(dLng/2)**2; return 2*R*Math.asin(Math.sqrt(h));}
function metersToLat(m){return m/111320;} function metersToLng(m,lat){return m/(111320*Math.cos(lat*Math.PI/180));}
function polyAreaMeters(poly){ let area=0; const lat0=centroid(poly)[0], kx=111320*Math.cos(lat0*Math.PI/180), ky=111320; for(let i=0,j=poly.length-1;i<poly.length;j=i++){ const xi=poly[i][1]*kx, yi=poly[i][0]*ky, xj=poly[j][1]*kx, yj=poly[j][0]*ky; area+=(xj+xi)*(yj-yi); } return Math.abs(area/2); }
window.addEventListener('load',()=>{initMap();onTemplateChanged();onDroneChanged();onRouteOrderChanged();onExportModeChanged();updateNoFlyInfo();setPlanMode('auto');});
</script>
